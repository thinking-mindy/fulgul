name: Build Windows

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-x64:
    name: Build Windows 64-bit
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app for Windows 64-bit (NSIS Installer)
        run: npm run tauri:build:win
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Windows 64-bit NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: fulgul-windows-x64-nsis
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Windows 64-bit Standalone Executable
        uses: actions/upload-artifact@v4
        with:
          name: fulgul-windows-x64-exe
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/fulgul.exe
            src-tauri/target/release/fulgul.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=Release ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "latest=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=continuous" >> "$GITHUB_OUTPUT"
            echo "name=Continuous build (v${VERSION})" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Windows assets to GitHub Release
        if: success() && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          body: |
            ## Windows builds
            - **NSIS installer** (`.exe`)
            - **Standalone** `fulgul.exe`

            Commit `${{ github.sha }}` · branch/tag `${{ github.ref_name }}`
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/fulgul.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/fulgul.exe
          draft: false
          make_latest: ${{ steps.release.outputs.latest }}
          fail_on_unmatched_files: false
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ steps.release.outputs.prerelease == 'true' || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
